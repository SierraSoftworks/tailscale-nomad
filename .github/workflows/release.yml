name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency: release-${{ github.event.release.tag_name }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  binaries:
    name: Build & upload binaries
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Determine version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Test
        run: go vet ./... && go test ./...

      - name: Build
        run: |
          mkdir -p dist
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" \
              go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" \
              -o dist/nomad-tailscale-connector .
            tar -C dist -czf "dist/nomad-tailscale-connector_${VERSION}_linux_${arch}.tar.gz" nomad-tailscale-connector
            rm dist/nomad-tailscale-connector
          done
          (cd dist && sha256sum *.tar.gz > SHA256SUMS)

      - name: Upload release artifacts
        uses: SierraSoftworks/gh-releases@v1.0.10
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          overwrite: "true"
          files: |
            dist/nomad-tailscale-connector_${{ env.VERSION }}_linux_amd64.tar.gz
            dist/nomad-tailscale-connector_${{ env.VERSION }}_linux_arm64.tar.gz
            dist/SHA256SUMS

  docker:
    name: Build & push container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      VERSION: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        env:
          TAG: ${{ github.event.release.tag_name }}
        run: echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ${{ env.REGISTRY }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Go cross-compiles on the build host (see the Dockerfile), so a single
      # multi-platform build stays fast and needs no QEMU emulation.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
