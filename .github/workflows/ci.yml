name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Vet & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./... && gofmt -l . | (! grep .)

      - name: Test
        run: go test ./...

      - name: Cross-compile
        run: |
          for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=linux GOARCH="$arch" go build -trimpath -o /dev/null .
          done
